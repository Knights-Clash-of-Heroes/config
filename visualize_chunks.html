<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Chunk Visualizer - Knights: Clash of Heroes</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --chunk-border: #334155;
            --square-border: #1e293b;
            --expansion-bg: rgba(239, 68, 68, 0.1);
            --starting-bg: rgba(34, 197, 94, 0.1);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .controls {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .swatch {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, auto);
            gap: 4px;
            padding: 1rem;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chunk {
            position: relative;
            width: 160px;
            height: 160px;
            border: 1px solid var(--chunk-border);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .chunk:hover {
            border-color: var(--accent);
            z-index: 10;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .chunk.expansion { background-color: var(--expansion-bg); }
        .chunk.starting { background-color: var(--starting-bg); }

        .square.occupied-building {
            background-color: #3b82f6;
            border-color: #60a5fa;
            z-index: 5;
        }

        .square.occupied-unit {
            background-color: #06b6d4;
            border-radius: 50%;
            transform: scale(0.8);
            z-index: 6;
        }

        .error {
            color: #ef4444;
            padding: 1rem;
            border: 1px solid #ef4444;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Kingdom Visualizer</h1>
        <p>Technical representation of Chunks and Assets</p>
    </header>

    <div class="controls">
        <div class="legend-item">
            <div class="swatch" style="background: var(--starting-bg); border: 1px solid #22c55e;"></div>
            <span>Starting Area</span>
        </div>
        <div class="legend-item">
            <div class="swatch" style="background: #3b82f6;"></div>
            <span>Building</span>
        </div>
        <div class="legend-item">
            <div class="swatch" style="background: #06b6d4; border-radius: 50%;"></div>
            <span>Unit</span>
        </div>
    </div>

    <div id="grid" class="grid-container"></div>
    <div id="tooltip" class="tooltip"></div>

    <script>
        // Dados sincronizados do initial_state.json e config.json
        const configData = {
            "chunkSize": 8,
            "buildingDefs": {
                "1": { "name": "Citadel", "w": 8, "h": 8 },
                "2": { "name": "Barracks", "w": 4, "h": 4, "color": "#f97316" },
                "3": { "name": "Pavillion", "w": 2, "h": 2 },
                "5": { "name": "Farm", "w": 4, "h": 4 },
                "13": { "name": "Altar of Heroes", "w": 5, "h": 5, "color": "#e11d48" },
                "14": { "name": "Market", "w": 5, "h": 5, "color": "#a855f7" }
            },
            "landChunks": [
                { "id": 1, "x": 1, "y": 1 }, { "id": 2, "x": 2, "y": 1 }, { "id": 3, "x": 3, "y": 1 },
                { "id": 4, "x": 1, "y": 2 }, { "id": 5, "x": 2, "y": 2 }, { "id": 6, "x": 3, "y": 2 },
                { "id": 7, "x": 1, "y": 3 }, { "id": 8, "x": 2, "y": 3 }, { "id": 9, "x": 3, "y": 3 },
                { "id": 10, "x": 0, "y": 0, "exp": true }, { "id": 11, "x": 1, "y": 0, "exp": true },
                { "id": 12, "x": 2, "y": 0, "exp": true }, { "id": 13, "x": 3, "y": 0, "exp": true },
                { "id": 14, "x": 4, "y": 0, "exp": true }, { "id": 15, "x": 4, "y": 1, "exp": true },
                { "id": 16, "x": 4, "y": 2, "exp": true }, { "id": 17, "x": 4, "y": 3, "exp": true },
                { "id": 18, "x": 4, "y": 4, "exp": true }, { "id": 19, "x": 3, "y": 4, "exp": true },
                { "id": 20, "x": 2, "y": 4, "exp": true }, { "id": 21, "x": 1, "y": 4, "exp": true },
                { "id": 22, "x": 0, "y": 4, "exp": true }, { "id": 23, "x": 0, "y": 3, "exp": true },
                { "id": 24, "x": 0, "y": 2, "exp": true }, { "id": 25, "x": 0, "y": 1, "exp": true }
            ]
        };

        const initialState = {
            "buildings": [
                { "building_id": 1, "chunk_id": 5, "x": 0, "y": 0 },
                { "building_id": 3, "chunk_id": 4, "x": 5, "y": 6 },
                { "building_id": 5, "chunk_id": 7, "x": 4, "y": 2 },
                { "building_id": 14, "chunk_id": 14, "x": 0, "y": 3 },
                { "building_id": 13, "chunk_id": 10, "x": 1, "y": 0 },
                { "building_id": 2, "chunk_id": 6, "x": 1, "y": 4 }
            ],
            "units": [
                { "unit_id": 1, "chunk_id": 8, "x": 3, "y": 4 },
                { "unit_id": 1, "chunk_id": 8, "x": 5, "y": 4 },
                { "unit_id": 1, "chunk_id": 8, "x": 7, "y": 4 },
                { "unit_id": 1, "chunk_id": 8, "x": 3, "y": 0 },
                { "unit_id": 1, "chunk_id": 8, "x": 4, "y": 0 }
            ]
        };

        function renderGrid() {
            const gridContainer = document.getElementById('grid');
            const tooltip = document.getElementById('tooltip');
            const chunks = configData.landChunks;
            const CHUNK_SIZE = configData.chunkSize;

            // 1. Mapeamento Global de Ocupação
            const globalOccupancy = {};
            
            initialState.buildings.forEach(b => {
                const anchorChunk = chunks.find(c => c.id === Number(b.chunk_id));
                const def = configData.buildingDefs[String(b.building_id)];
                if (!anchorChunk || !def) return;

                const startGX = anchorChunk.x * CHUNK_SIZE + b.x;
                const startGY = anchorChunk.y * CHUNK_SIZE + b.y;

                for (let dy = 0; dy < def.h; dy++) {
                    for (let dx = 0; dx < def.w; dx++) {
                        globalOccupancy[`${startGX + dx},${startGY + dy}`] = { type: 'building', name: def.name };
                    }
                }
            });

            initialState.units.forEach(u => {
                const anchorChunk = chunks.find(c => c.id === Number(u.chunk_id));
                if (!anchorChunk) return;
                const gx = anchorChunk.x * CHUNK_SIZE + u.x;
                const gy = anchorChunk.y * CHUNK_SIZE + u.y;
                globalOccupancy[`${gx},${gy}`] = { type: 'unit' };
            });

            const sortedChunks = [...chunks].sort((a, b) => {
                if (a.y !== b.y) return a.y - b.y;
                return a.x - b.x;
            });

            gridContainer.innerHTML = ''; // Limpa antes de renderizar

            sortedChunks.forEach(chunk => {
                const chunkEl = document.createElement('div');
                chunkEl.className = `chunk ${chunk.exp ? 'expansion' : 'starting'}`;
                
                const idEl = document.createElement('div');
                idEl.className = 'chunk-id';
                idEl.textContent = chunk.id;
                chunkEl.appendChild(idEl);

                for (let y = 0; y < CHUNK_SIZE; y++) {
                    for (let x = 0; x < CHUNK_SIZE; x++) {
                        const square = document.createElement('div');
                        square.className = 'square';
                        
                        const gx = chunk.x * CHUNK_SIZE + x;
                        const gy = chunk.y * CHUNK_SIZE + y;
                        const occ = globalOccupancy[`${gx},${gy}`];

                        if (occ) {
                            square.classList.add(occ.type === 'building' ? 'occupied-building' : 'occupied-unit');
                            // Borda interna para construções
                            if (occ.type === 'building') square.style.outline = '1px solid rgba(255,255,255,0.1)';
                        }

                        square.title = `Chunk: ${chunk.id} | Square: [${x}, ${y}]${occ ? ' | ' + (occ.name || 'Unit') : ''}`;
                        
                        square.onmouseenter = (e) => {
                            e.stopPropagation();
                            tooltip.style.display = 'block';
                            tooltip.innerHTML = `
                                <strong>Chunk ID: ${chunk.id}</strong><br>
                                <span style="color: var(--accent)">Square: [${x}, ${y}]</span><br>
                                <span style="color: #94a3b8">Global: [${gx}, ${gy}]</span><br>
                                ${occ ? `<span style="color: #fbbf24">${occ.name || 'Unit'}</span><br>` : ''}
                                Glob. Chunk: [X: ${chunk.x}, Y: ${chunk.y}]
                            `;
                        };

                        square.onclick = (e) => {
                            e.stopPropagation();
                            const data = `{"chunk_id": ${chunk.id}, "x": ${x}, "y": ${y}}`;
                            navigator.clipboard.writeText(data);
                            console.log("Selection copied to clipboard:", data);
                            square.style.filter = 'brightness(2)';
                            setTimeout(() => square.style.filter = 'none', 200);
                        };
                        
                        chunkEl.appendChild(square);
                    }
                }

                chunkEl.onmousemove = (e) => {
                    tooltip.style.left = e.clientX + 15 + 'px';
                    tooltip.style.top = e.clientY + 15 + 'px';
                };

                chunkEl.onmouseleave = () => { tooltip.style.display = 'none'; };
                gridContainer.appendChild(chunkEl);
            });
        }

        renderGrid();
    </script>
   }

        renderGrid();
    </script>
</body>
</html>
